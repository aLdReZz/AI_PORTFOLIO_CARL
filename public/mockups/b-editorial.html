<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Direction B — Editorial index</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: hsl(38, 30%, 94%);
    --ink: hsl(30, 12%, 12%);
    --muted: hsl(30, 8%, 42%);
    --accent: hsl(24, 42%, 42%);
    --line: hsla(30, 20%, 20%, 0.16);
  }
  body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
  .wrap { height: 100vh; display: flex; flex-direction: column; padding: 1.8rem 2.6rem 2rem; }
  .meta { display: flex; justify-content: space-between; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); padding-bottom: 1.4rem; border-bottom: 1px solid var(--line); }
  .hero { padding: 2.6rem 0 2rem; }
  .hero h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(2.3rem, 5vw, 4rem); line-height: 1.02; letter-spacing: -0.02em; max-width: 18ch; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .body { flex: 1; display: grid; grid-template-columns: 1.4fr 1fr; gap: 3rem; align-items: start; }
  .index { border-top: 1px solid var(--line); }
  .row { display: grid; grid-template-columns: 2.5rem 1fr auto; align-items: center; gap: 1rem; padding: 1.05rem 0; border-bottom: 1px solid var(--line); }
  .num { font-family: 'Fraunces', serif; font-size: 0.9rem; color: var(--muted); }
  .title { font-size: 1.05rem; font-weight: 500; }
  .tag { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .feature { position: relative; aspect-ratio: 9/13; border-radius: 12px; overflow: hidden; background: #ddd; box-shadow: 0 20px 50px -20px rgba(40,30,20,0.35); }
  .feature video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .feature .cap { position: absolute; left: 0.9rem; bottom: 0.8rem; color: #fff; font-size: 0.78rem; letter-spacing: 0.04em; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta"><span>Carl Sanchez — AI Video Ads</span><span>eCommerce · 2026</span></div>
  <div class="hero">
    <h1>Video ads for eCommerce brands that <em>refuse to look cheap.</em></h1>
  </div>
  <div class="body">
    <div class="index">
      <div class="row"><span class="num">01</span><span class="title">Vesta — product launch reel</span><span class="tag">Short-form</span></div>
      <div class="row"><span class="num">02</span><span class="title">LiveChi — brand campaign</span><span class="tag">Editing</span></div>
      <div class="row"><span class="num">03</span><span class="title">NAR — explainer ad</span><span class="tag">Long-form</span></div>
      <div class="row"><span class="num">04</span><span class="title">CIFC — promo cut</span><span class="tag">Short-form</span></div>
      <div class="row"><span class="num">05</span><span class="title">Coaching brand — hook reel</span><span class="tag">Short-form</span></div>
    </div>
    <div class="feature">
      <video src="/assets/Video/vesta_-_nick_picks_episode_8_reel_7%20(1080p).mp4" autoplay muted loop playsinline></video>
      <span class="cap">Vesta — 2024</span>
    </div>
  </div>
</div>
</body>
</html>
