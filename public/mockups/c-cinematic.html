<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Direction C — Cinematic single reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: hsl(30, 8%, 4%);
    --text: hsl(36, 14%, 92%);
    --muted: hsl(36, 7%, 55%);
    --accent: hsl(37, 44%, 66%);
    --line: hsla(38, 24%, 82%, 0.14);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
  .wrap { height: 100vh; display: grid; grid-template-columns: 1.1fr 0.9fr; }
  .left { padding: 2.4rem 2.8rem; display: flex; flex-direction: column; justify-content: space-between; }
  .wordmark { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.02em; }
  .center h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(2.4rem, 4.4vw, 3.8rem); line-height: 1.05; letter-spacing: -0.02em; max-width: 15ch; }
  .center .kicker { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.4rem; }
  .center p { margin-top: 1.6rem; color: var(--muted); max-width: 42ch; font-size: 1rem; line-height: 1.7; }
  .actions { margin-top: 2.2rem; display: flex; gap: 0.8rem; }
  .btn { padding: 0.85rem 1.5rem; border-radius: 999px; font-size: 0.9rem; font-weight: 500; }
  .btn-p { background: var(--accent); color: #201a12; }
  .btn-g { border: 1px solid var(--line); color: var(--text); }
  .foot { display: flex; gap: 1.6rem; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .right { position: relative; overflow: hidden; border-left: 1px solid var(--line); }
  .right video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rgrad { position: absolute; inset: 0; background: linear-gradient(90deg, var(--bg), transparent 22%); pointer-events: none; }
  .hud { position: absolute; top: 1.4rem; right: 1.6rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; letter-spacing: 0.14em; color: #fff; text-transform: uppercase; }
  .hud .rec { width: 7px; height: 7px; border-radius: 50%; background: #e0563f; }
  .hud .tc { position: absolute; top: 1.4rem; }
  .cap { position: absolute; left: 1.6rem; bottom: 1.4rem; color: #fff; font-size: 0.8rem; letter-spacing: 0.04em; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="wordmark">Carl Sanchez</div>
    <div class="center">
      <div class="kicker">AI video ads · eCommerce</div>
      <h1>Product ads with a cinematic finish.</h1>
      <p>AI product visuals and short-form ads, edited end to end — built to stop the scroll and sell.</p>
      <div class="actions">
        <span class="btn btn-p">Work with me ↗</span>
        <span class="btn btn-g">View work</span>
      </div>
    </div>
    <div class="foot"><span>Veo 3.1</span><span>Kling</span><span>Higgsfield</span><span>CapCut</span></div>
  </div>
  <div class="right">
    <video src="/assets/Video/livechi_x_cirrus_mini_episode_2_reel_rev4%20(1080p).mp4" autoplay muted loop playsinline></video>
    <div class="rgrad"></div>
    <div class="hud"><span class="rec"></span> Reel 01</div>
    <div class="cap">LiveChi × Cirrus — brand campaign</div>
  </div>
</div>
</body>
</html>
